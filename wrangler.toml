[env.production]
name = "katelyatv"

[[env.production.d1_databases]]
binding = "DB"
database_name = "katelyatv-db"
database_id = "403d8985-9f86-48c5-9920-4b04ff3c5d83"

[env.production.vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_SITE_NAME = "gkdtv"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://katelyatv-cew.pages.dev"
USERNAME = "ljq"
AUTH_PASSWORD = "jk712732"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
